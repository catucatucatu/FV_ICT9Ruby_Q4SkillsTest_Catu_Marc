<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: Montserrat;
        }

        div{
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="bg-dark text-light mx-5 my-5 p-4">

    <form>
        <h2>Login Form</h2>
        <label for="uname">Name</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>  

        <label for="pwd">Password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br> 
        
        <p id="display"></p>

        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">

         <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5">
    </form>
    </div>

    <script>
        let attempt_counter = 0;

        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";

        while (attempt_counter < 3) {
        if (username === "mrbeast67" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";

            break; // stop loop
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }

        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>
    
</body>
</html>
